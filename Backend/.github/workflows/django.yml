name: E-Commerce CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ================================================================== #
  #  JOB 1 — Run Tests                                                  #
  # ================================================================== #
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       ${{ secrets.DB_NAME }}
          POSTGRES_USER:     ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG:       "True"
      SECRET_KEY:  ${{ secrets.SECRET_KEY }}
      DB_NAME:     ${{ secrets.DB_NAME }}
      DB_USER:     ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST:     localhost
      DB_PORT:     5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Run all tests
        working-directory: backend
        run: |
          python manage.py test \
            apps.accounts.tests \
            apps.adminside.product.tests.test_Product \
            apps.userside.cart.tests.test_cart \
            --verbosity=2

  # ================================================================== #
  #  JOB 2 — Build & Push Docker Image (only on push to main)          #
  # ================================================================== #
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                         # only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          push:      true
          tags:      ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest

  # ================================================================== #
  #  JOB 3 — Deploy to Server (only on push to main)                   #
  # ================================================================== #
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build                        # only runs if build passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/E-commerce
            docker-compose pull backend
            docker-compose up -d --no-deps backend
            docker-compose exec -T backend python manage.py migrate
            echo "✅ Deployment complete"