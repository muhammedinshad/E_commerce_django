version: '3.9'

services:

  db:
    image: postgres:15
    container_name: ecommerce_db
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: django
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_NAME=ecommerce
      - DB_USER=postgres
      - DB_PASSWORD=django
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ecommerce_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend_dist:/usr/share/nginx/html
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      - backend

volumes:
  postgres_data:
  media_volume:
  static_volume: